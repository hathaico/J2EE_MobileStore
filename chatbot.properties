# MobileStore Chatbot Configuration File
# Use this file to customize chatbot behavior

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Chatbot Settings
chatbot.name=MobileStore Virtual Assistant
chatbot.version=1.0
chatbot.language=vi_VN

# Feature Toggles
chatbot.features.product-recommendation=true
chatbot.features.product-comparison=true
chatbot.features.price-checking=true
chatbot.features.stock-checking=true
chatbot.features.shipping-info=true
chatbot.features.promotions=true
chatbot.features.technical-faq=true
chatbot.features.order-tracking=false

# Response Settings
chatbot.response.typing-delay-ms=500
chatbot.response.suggested-questions=true
chatbot.response.max-products-to-show=5
chatbot.response.max-comparison-products=3

# Shipping Configuration
chatbot.shipping.default-region=HANOI
chatbot.shipping.enable-real-time-calculation=false
chatbot.shipping.carrier=EXPRESS

# Promotion Configuration
chatbot.promotions.enable-discount=true
chatbot.promotions.installment-months=12
chatbot.promotions.trade-in-enabled=true
chatbot.promotions.bundle-enabled=true

# AI/NLP Settings (for future use)
chatbot.ai.enabled=false
chatbot.ai.provider=openai
chatbot.ai.model=gpt-3.5-turbo
chatbot.ai.temperature=0.7

# Database Configuration (for future use)
chatbot.database.type=sample
# chatbot.database.type=mysql
# spring.datasource.url=jdbc:mysql://localhost:3306/mobilestore
# spring.datasource.username=root
# spring.datasource.password=password

# Logging
logging.level.com.mobilestore=DEBUG
logging.level.org.springframework.web=INFO

# Training Dataset History Retention (days)
# 0 means keep only versions created today (prune older files immediately)
chatbot.training.history.retention-days=30
